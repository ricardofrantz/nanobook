# IBKR paper trading configuration for v0.15 paper trading soak
#
# This configuration uses IBKR paper trading (no real money).
# Adjust values based on your paper account size and risk tolerance.

[connection]
# IBKR Gateway connection settings
host = "127.0.0.1"
port = 4002              # 4002 = Gateway paper, 7497 = TWS paper, 7496 = TWS live
client_id = 100         # Unique ID per connection (1-999999)
timeout_secs = 30       # Connection timeout

[account]
# IBKR account information
id = "DU123456"         # Paper: DUxxxxxx, Live: Uxxxxxxx (get from IBKR account management)
type = "margin"          # "cash" or "margin"

[execution]
# Order execution settings
order_interval_ms = 100  # Min delay between orders (rate limiting)
limit_offset_bps = 5     # Buy at ask+5bps, sell at bid-5bps (slippage buffer)
order_timeout_secs = 300  # Cancel unfilled orders after 5 min
max_orders_per_run = 50  # Maximum orders per rebalance run
quote_staleness_threshold_sec = 30  # Reject quotes older than 30 seconds

[risk]
# Risk limits for paper trading
max_position_pct = 0.25   # Max 25% in any single name
max_leverage = 1.0       # Max gross exposure / equity (1.0 = no leverage for paper)
min_trade_usd = 100.0    # Skip tiny trades below $100
max_trade_usd = 10000.0  # Block huge trades above $10,000
allow_short = true       # Allow short positions
max_short_pct = 0.20     # Max 20% total short exposure

[cost]
# Trading cost model
commission_per_share = 0.0035  # IBKR Tiered commission
commission_min = 0.35          # Minimum commission per order
slippage_bps = 5               # Expected slippage in basis points

[logging]
# Audit logging settings
dir = "./audit"          # Directory for audit logs
audit_file = "audit.jsonl"  # Audit log filename
clock_skew_threshold_sec = 30   # Max backward clock jump before warning
max_jump_rate_sec_per_sec = 2.0  # Max forward jump rate (2x real time)
